# CI — the integration safety net (issue #1, PR A0).
# Unit layers run on every PR and push to main; the Playwright functional layer is
# heavier (headless Chromium + live open-data APIs) so it runs on manual dispatch
# until it proves stable in CI.
name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests (site + worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Script syntax gate (all pages + i18n.js)
        run: python3 test/standards/js_syntax.py
      - name: i18n key parity
        run: python3 test/standards/i18n_keys.py
      - name: i18n reference + cache-skew gate
        run: python3 test/standards/i18n_refs.py
      - name: Stray-English static lint
        run: python3 test/standards/stray_english.py
      - name: Spanish diacritics gate
        run: python3 test/standards/es_diacritics.py
      - name: i18n glossary + placeholder-parity gate
        run: python3 test/standards/i18n_glossary.py
      - name: Attribution-presence gate (open-data citation, LL11/2012)
        run: python3 test/standards/attribution.py
      - name: Descriptive-link-text lint (NYC Web Content Style Guide)
        run: python3 test/standards/link_text.py
      - name: Static outline:none guard (focus-visible companion)
        run: python3 test/standards/outline_guard.py
      - name: Form-control border contrast gate (WCAG 1.4.11)
        run: python3 test/standards/form_border_contrast.py
      - name: NYC copy lint (NYC Web Content Style Guide)
        run: python3 test/standards/nyc_copy_lint.py --gate
      - name: Page-metadata gate (meta description length, title format)
        run: python3 test/standards/page_metadata.py
      - name: External-link presentation gate (same-tab, no link icons)
        run: python3 test/standards/link_targets.py
      - name: Heading-punctuation lint (NYC Web Content Style Guide)
        run: python3 test/standards/heading_punctuation.py
      - name: GenAI content-disclosure presence gate
        run: python3 test/standards/genai_disclosure.py
      - name: Site unit tests
        # Scoped to test/ — a bare `node --test` also recurses into worker/test/,
        # which needs worker/node_modules (installed in the next step).
        run: node --test test/*.test.mjs
      - name: Worker dependencies
        run: npm ci
        working-directory: worker
      - name: Worker unit tests
        run: node --test
        working-directory: worker

  # w7-01: promotes the axe gate + language gate to every PR. The pages under test are
  # static + local (a plain http.server, no live open-data traffic), so the flakiness that
  # parks the heavier functional suite on manual dispatch doesn't apply here.
  a11y-pr:
    name: Accessibility + language gate (axe on every PR)
    # runs on pull_request per w7-01 (static local pages only, no live-API flakiness)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium
      - name: Serve site locally
        run: |
          python3 -m http.server 8000 &
          sleep 1
      - name: axe accessibility gate (load + every activated tab state)
        run: python3 test/functional/11_accessibility.py
      - name: Language switcher gate
        run: python3 test/functional/12_language.py
      - name: Focus-visibility keyboard-walk gate
        run: python3 test/functional/14_focus_visible.py
      - name: Label-coverage census (rendered DOM, incl. hidden + JS-built fields)
        run: python3 test/standards/label_coverage.py
      - name: Heading-uniqueness + landmark check (per rendered state)
        run: python3 test/standards/heading_uniqueness.py

  # The runtime stray-English guard is hermetic (fixture dataset, every upstream stubbed),
  # so unlike the live-API functional layer it runs on EVERY PR: untranslated chrome in a
  # shipped language mode fails the build. Parameterized by CROL_GUARD_LANGS as LL30
  # languages ship (wave 7 activates one run per language).
  i18n-guard:
    name: Stray-English guard (runtime, fixtures)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium
      - name: Run guard (es + zh-Hans + ru + bn + ht + ko + fr + pl + ar + ur, all pages)
        env:
          CROL_GUARD_LANGS: es,zh-Hans,ru,bn,ht,ko,fr,pl,ar,ur
          CROL_GUARD_PAGES: index,about,data,stats,api,changelog
        run: python3 test/functional/13_stray_english.py
      - name: RTL guard (ar + ur — dir propagation, logical-property mirroring, bidi isolation)
        run: python3 test/functional/15_rtl.py

  # readable-or-else (github.com/jimdc/readable-or-else): ratchet-mode reading-level gate
  # against the committed baseline (nycsg7 = NYC Web Content Style Guide, FK grade 7). Its
  # own job per docs/consumers/crol-list.md in that repo, mirroring the unit / i18n-guard
  # split — it's the first job to need textstat/beautifulsoup4, keep that isolated too.
  # Not yet on PyPI; install straight from the (public) source repo.
  reading-level:
    name: Reading-level ratchet gate (readable-or-else)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install readable-or-else
        run: pip install git+https://github.com/jimdc/readable-or-else.git
      - name: Reading-level ratchet gate
        run: |
          readable-or-else check \
            about.html api.html changelog.html data.html index.html stats.html \
            --preset nycsg7 \
            --mode ratchet \
            --baseline reading-level-baseline.json \
            --format gh-annotations
      # Opt-in only — a manually-labeled PR gets LLM-drafted plain-language suggestions as
      # PR-ready JSON (not auto-applied; a human reviews and accepts/discards). Needs
      # READABLE_OR_ELSE_LLM_BASE / READABLE_OR_ELSE_LLM_KEY / READABLE_OR_ELSE_LLM_MODEL
      # repo secrets pointed at an OpenAI-compatible endpoint — this repo doesn't have them
      # yet, so this step never runs until they're added. `fix` mode (auto-apply, gated by
      # readable-or-else's denial rules) is documented in that repo's README as the next step
      # up from --suggest; wiring it as an auto-commit CI step is a separate, deliberate
      # opt-in this repo hasn't taken — see AGENTS.md.
      - name: Suggest simplifications (opt-in via PR label)
        if: contains(github.event.pull_request.labels.*.name, 'suggest-rewrite')
        env:
          READABLE_OR_ELSE_LLM_BASE: ${{ secrets.READABLE_OR_ELSE_LLM_BASE }}
          READABLE_OR_ELSE_LLM_KEY: ${{ secrets.READABLE_OR_ELSE_LLM_KEY }}
          READABLE_OR_ELSE_LLM_MODEL: ${{ secrets.READABLE_OR_ELSE_LLM_MODEL }}
        run: |
          readable-or-else check data.html index.html \
            --preset nycsg7 --mode warn --suggest --format json \
            > readable-or-else-suggestions.json

  functional:
    name: Functional (Playwright, manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium
      - name: Run functional suite
        run: bash test/functional/run.sh
